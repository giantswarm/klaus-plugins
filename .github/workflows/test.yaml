name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'

    - name: Run tests
      run: |
        npm test

    - name: Check for markdown issues
      run: |
        echo "Checking markdown files..."
        # Find all .md files in commands directories
        find plugins/*/commands -name "*.md" -type f | while read -r file; do
          echo "Checking $file..."

          # Check if file has frontmatter
          if ! head -n 1 "$file" | grep -q "^---$"; then
            echo "⚠️  Warning: $file may be missing frontmatter"
          fi

          # Check if file is not empty
          if [ ! -s "$file" ]; then
            echo "❌ Error: $file is empty"
            exit 1
          fi
        done
        echo "✅ Markdown checks passed"
